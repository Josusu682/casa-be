<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pago cancelado – Fintoc</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem; max-width: 420px; width: 100%; text-align: center;
    }
    .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    h1 { color: #c53030; font-size: 1.5rem; margin-bottom: .5rem; }
    p { color: #4a5568; font-size: .95rem; margin-bottom: 1.5rem; }
    a.btn {
      display: inline-block; padding: .7rem 1.6rem;
      background: linear-gradient(135deg,#6C63FF,#5a54e8);
      color: #fff; border-radius: 10px; font-weight: 700;
      text-decoration: none; font-size: .95rem;
    }
    small { display: block; color: #a0aec0; font-size: .75rem; margin-top: 1.2rem; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon">&#x274C;</div>
  <h1>Pago cancelado</h1>
  <p>El proceso de pago fue cancelado o no se completó. <br/>
  Puedes intentarlo de nuevo cuando quieras.</p>
  <a class="btn" href="/index.html">Intentar de nuevo</a>
  <small>Modo sandbox – no se realizó ningún cobro</small>
</div>
</body>
</html>
